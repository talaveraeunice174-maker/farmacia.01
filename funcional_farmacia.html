<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Farmacia Digital - Compra Online</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  :root {
    --bg: #ffffff; 
    --surface: #f8f9fa; 
    --card: #ffffff; 
    --border: #e0e0e0;
    --accent1: #00a8e8; 
    --accent2: #00c853; 
    --accent3: #ff5252;
    --text: #1a1a1a; 
    --muted: #555555;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 16px;
  }
  header {
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }
  .logo { font-size: 2.2rem; }

  .category-filters {
    padding: 15px 40px;
    background: var(--surface);
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .cat-btn {
    padding: 10px 20px;
    border-radius: 999px;
    background: var(--card);
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 0.95rem;
    color: var(--text);
    white-space: nowrap;
  }
  .cat-btn.active {
    background: var(--accent1);
    color: white;
    border-color: var(--accent1);
  }

  #catalog {
    padding: 30px 40px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 20px;
  }
  .product {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    transition: all .2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .product:hover { transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0,168,232,.15); }
  .product img {
    width: 100%;
    height: 160px;
    object-fit: contain;
    border-radius: 8px;
    margin-bottom: 12px;
    background: #f8f9fa;
    padding: 8px;
  }

  /* ── LOGIN ── */
  #login-screen {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #004e92 0%, #000428 100%);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  .login-box {
    background: #fff;
    border-radius: 18px;
    padding: 44px 40px 36px;
    width: 100%; max-width: 380px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    text-align: center;
  }
  .login-logo {
    font-size: 3.2rem; margin-bottom: 6px;
  }
  .login-box h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem; font-weight: 700;
    color: #004e92; margin-bottom: 4px;
  }
  .login-box p.sub {
    font-size: 0.88rem; color: #888; margin-bottom: 28px;
  }
  .login-field {
    text-align: left; margin-bottom: 16px;
  }
  .login-field label {
    display: block; font-size: 0.82rem;
    font-weight: 600; color: #555; margin-bottom: 5px;
  }
  .login-field input {
    width: 100%; padding: 11px 14px;
    border: 1.5px solid #ddd; border-radius: 9px;
    font-size: 0.95rem; color: #1a1a1a;
    background: #f9f9f9; outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .login-field input:focus {
    border-color: #00a8e8;
    box-shadow: 0 0 0 3px rgba(0,168,232,0.15);
    background: #fff;
  }
  .login-error {
    background: #fff0f0; border: 1px solid #ffcdd2;
    color: #c62828; border-radius: 8px;
    padding: 9px 14px; font-size: 0.85rem;
    margin-bottom: 14px; display: none;
  }
  .login-btn {
    width: 100%; padding: 13px;
    background: linear-gradient(90deg, #00a8e8, #0077cc);
    color: #fff; border: none; border-radius: 9px;
    font-size: 1rem; font-weight: 700;
    cursor: pointer; margin-top: 6px;
    transition: opacity .2s, transform .1s;
    letter-spacing: .03em;
  }
  .login-btn:hover { opacity: .92; }
  .login-btn:active { transform: scale(.98); }
  .login-hint {
    margin-top: 18px; font-size: 0.8rem; color: #aaa;
  }
  .login-hint span { color: #004e92; font-weight: 600; }
  /* nav usuario */
  #nav-user-info {
    font-size: 0.9rem; color: #333;
    display: flex; align-items: center; gap: 10px;
  }
  #btn-logout {
    padding: 5px 14px; border-radius: 6px;
    border: 1px solid #ddd; background: #fff;
    font-size: 0.82rem; color: #c62828;
    cursor: pointer; font-weight: 600;
    transition: background .15s;
  }
  #btn-logout:hover { background: #fff0f0; }
</style>
</head>
<body>

<!-- ══ PANTALLA DE LOGIN ══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">💊</div>
    <h1>Farmacia Digital</h1>
    <p class="sub">Sistema de gestión farmacéutica</p>
    <div class="login-error" id="login-error">❌ Usuario o contraseña incorrectos</div>
    <div class="login-field">
      <label for="inp-user">Usuario</label>
      <input type="text" id="inp-user" placeholder="Ingresa tu usuario"
             onkeydown="if(event.key==='Enter') doLogin()"/>
    </div>
    <div class="login-field">
      <label for="inp-pass">Contraseña</label>
      <input type="password" id="inp-pass" placeholder="Ingresa tu contraseña"
             onkeydown="if(event.key==='Enter') doLogin()"/>
    </div>
    <button class="login-btn" onclick="doLogin()">Ingresar al sistema</button>
    <div class="login-hint">Credenciales: usuario <span>admin</span> · contraseña <span>1234</span></div>
  </div>
</div>


<header>
  <div class="logo">💊 Farmacia Digital</div>
  <div>
    <button onclick="showTab(0)" class="tab active">Catálogo</button>
    <button onclick="showTab(1)" class="tab">Carrito (<span id="cart-count">0</span>)</button>
    <button onclick="showTab(2)" class="tab">Flujo del Sistema</button>
  </div>
  <div id="nav-user-info">
    <span>👤 <strong id="nav-username"></strong></span>
    <button id="btn-logout" onclick="doLogout()">Cerrar sesión</button>
  </div>
</header>

<div class="category-filters" id="categoryFilters"></div>

<div id="tab0">
  <div style="padding:20px 40px; background:var(--surface);">
    <input type="text" id="search" placeholder="Buscar medicamentos..." style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; background:white; color:#1a1a1a;" onkeyup="filterProducts()">
  </div>
  <div id="catalog"></div>
</div>

<div id="tab1" style="display:none;">
  <div id="cart"></div>
  <div style="text-align:center; padding:30px;">
    <button onclick="checkout()" style="background:var(--accent1); color:white; font-size:1.1rem; padding:15px 40px;">Proceder al Pago</button>
  </div>
</div>

<div id="tab2" style="display:none;">
  <div id="flow"></div>
</div>

<!-- Factura Modal -->
<div id="invoice-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000;">
  <div id="invoice">
    <h2 style="text-align:center;">Factura Farmacia Digital</h2>
    <p style="text-align:center;"><strong>Cliente:</strong> Usuario Demo | <strong>Fecha:</strong> <span id="invoice-date"></span></p>
    <div id="invoice-content"></div>
    <div style="text-align:center; margin-top:30px;">
      <button onclick="downloadPDF()" style="background:#00c853; color:white; padding:12px 30px;">📄 Descargar PDF</button>
      <button onclick="closeInvoice()" style="background:#ff5252; color:white; padding:12px 30px; margin-left:15px;">Cerrar</button>
    </div>
  </div>
</div>

let cart = [];
let currentCategory = "all";

// Funciones principales
function renderCategoryFilters() {
  const categories = ["all", ...new Set(products.map(p => p.category))];
  const container = document.getElementById("categoryFilters");
  container.innerHTML = `<button class="cat-btn active" data-category="all">Todos</button>`;
  
  categories.forEach(cat => {
    if (cat !== "all") {
      container.innerHTML += `<button class="cat-btn" data-category="${cat}">${cat}</button>`;
    }
  });

  container.querySelectorAll(".cat-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentCategory = btn.dataset.category;
      filterProducts();
    });
  });
}

function renderCatalog(filtered) {
  const container = document.getElementById("catalog");
  container.innerHTML = "";
  filtered.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <img src="${p.img}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p><strong>C$ ${p.price.toLocaleString('es-NI')}</strong></p>
        <small style="color:#555;">${p.category}</small>
        <button class="add-btn" onclick="addToCart(${p.id})">Agregar al Carrito</button>
      </div>`;
  });
}

function filterProducts() {
  const term = document.getElementById("search").value.toLowerCase();
  let filtered = products;
  if (currentCategory !== "all") filtered = filtered.filter(p => p.category === currentCategory);
  if (term) filtered = filtered.filter(p => p.name.toLowerCase().includes(term));
  renderCatalog(filtered);
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  const existing = cart.find(item => item.id === id);
  if (existing) existing.quantity++;
  else cart.push({...product, quantity:1});
  updateCartCount();
  alert(`${product.name} agregado al carrito`);
}

function updateCartCount() {
  document.getElementById("cart-count").textContent = cart.reduce((a,c)=>a+c.quantity,0);
}

// Resto de funciones (carrito, PDF, flujo, modales)
function renderCart() {
  const container = document.getElementById("cart");
  if (cart.length === 0) {
    container.innerHTML = "<p style='text-align:center; padding:80px; font-size:1.2rem;'>El carrito está vacío</p>";
    return;
  }
  let html = `<h2>Carrito de Compras</h2>`;
  let total = 0;
  cart.forEach((item, i) => {
    const subtotal = item.price * item.quantity;
    total += subtotal;
    html += `
      <div class="cart-item" style="display:flex;justify-content:space-between;padding:15px;background:#f8f9fa;margin-bottom:10px;border-radius:10px;">
        <div><strong>${item.name}</strong><br>C$ ${item.price} × ${item.quantity}</div>
        <div style="text-align:right;">
          <strong>C$ ${subtotal.toLocaleString('es-NI')}</strong><br>
          <button onclick="changeQuantity(${i}, -1)">−</button>
          <button onclick="changeQuantity(${i}, 1)">+</button>
          <button onclick="removeFromCart(${i})" style="color:#ff5252;margin-left:15px;">Eliminar</button>
        </div>
      </div>`;
  });
  html += `<h3 style="text-align:right;margin-top:20px;">Total: C$ ${total.toLocaleString('es-NI')}</h3>`;
  container.innerHTML = html;
}

function changeQuantity(i, change) {
  cart[i].quantity += change;
  if (cart[i].quantity <= 0) cart.splice(i,1);
  renderCart();
  updateCartCount();
}

function removeFromCart(i) {
  cart.splice(i,1);
  renderCart();
  updateCartCount();
}

function checkout() {
  if (cart.length === 0) return alert("El carrito está vacío");
  generateInvoice();
}

function generateInvoice() {
  const date = new Date().toLocaleDateString('es-NI', {year:'numeric', month:'long', day:'numeric'});
  document.getElementById("invoice-date").textContent = date;
  let content = `<h3>Detalle de Productos</h3>`;
  let total = 0;
  cart.forEach(item => {
    const subtotal = item.price * item.quantity;
    total += subtotal;
    content += `<p>${item.name} × ${item.quantity} = <strong>C$ ${subtotal.toLocaleString('es-NI')}</strong></p>`;
  });
  content += `<hr><h3>Total: C$ ${total.toLocaleString('es-NI')}</h3>`;
  document.getElementById("invoice-content").innerHTML = content;
  document.getElementById("invoice-modal").style.display = "block";
}

function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFont("helvetica", "bold");
  doc.setFontSize(20);
  doc.text("FARMACIA DIGITAL", 105, 20, { align: "center" });
  doc.text("Factura de Venta", 105, 30, { align: "center" });
  doc.text(`Fecha: ${new Date().toLocaleDateString('es-NI')}`, 20, 45);
  doc.text("Cliente: Usuario Demo", 20, 55);
  let y = 75, total = 0;
  cart.forEach(item => {
    const subtotal = item.price * item.quantity;
    total += subtotal;
    doc.text(item.name, 20, y);
    doc.text(`x${item.quantity}`, 120, y);
    doc.text(`C$ ${subtotal.toLocaleString('es-NI')}`, 170, y, { align: "right" });
    y += 10;
  });
  doc.text(`Total: C$ ${total.toLocaleString('es-NI')}`, 170, y+20, { align: "right" });
  doc.save("Factura_Farmacia_Digital.pdf");
  alert("✅ Factura PDF descargada correctamente!");
}

function closeInvoice() {
  document.getElementById("invoice-modal").style.display = "none";
  cart = [];
  updateCartCount();
  showTab(0);
}

function showTab(n) {
  document.querySelectorAll("#tab0, #tab1, #tab2").forEach((tab,i) => tab.style.display = i === n ? "block" : "none");
  document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", i===n));
  if (n === 1) renderCart();
  if (n === 2) renderFlow();
}

const steps = [
  {num:"01", title:"Inicio", body:"El usuario entra al sistema web de la farmacia digital."},
  {num:"02", title:"Autenticación", body:"Inicio de sesión exitoso."},
  {num:"03", title:"Explorar Productos", body:"Productos seleccionados según su necesidad."},
  {num:"04", title:"Carrito de Compras", body:"Revisión final de la compra."},
  {num:"05", title:"Validación de Productos Controlados", body:"Revisión completada."},
  {num:"06", title:"Gestión de Receta", body:"Receta aprobada cuando aplica."},
  {num:"07", title:"Proceso de Pago", body:"Pago procesado exitosamente."},

  {num:"15", title:"Fin del Proceso", body:"¡Gracias por su compra!"}
];

function renderFlow() {
  const container = document.getElementById("flow");
  container.innerHTML = "<h2 style='text-align:center;margin-bottom:30px;'>Flujo Completo del Sistema (15 Pasos)</h2>";
  steps.forEach(s => {
    container.innerHTML += `<div class="node" style="margin-bottom:20px;padding:20px;border:1px solid #ddd;border-radius:12px;"><strong>PASO ${s.num} — ${s.title}</strong><p>${s.body}</p></div>`;
  });
}


// ══ AUTENTICACIÓN ══
const USERS = [
  { user: "admin", pass: "1234", nombre: "Administrador" }
];

function doLogin() {
  const u = document.getElementById('inp-user').value.trim();
  const p = document.getElementById('inp-pass').value;
  const found = USERS.find(x => x.user === u && x.pass === p);
  if (!found) {
    const err = document.getElementById('login-error');
    err.style.display = 'block';
    document.getElementById('inp-pass').value = '';
    document.getElementById('inp-pass').focus();
    setTimeout(() => err.style.display = 'none', 3000);
    return;
  }
  // Login exitoso
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('nav-username').textContent = found.nombre;
}

function doLogout() {
  if (!confirm('¿Deseas cerrar sesión?')) return;
  document.getElementById('inp-user').value = '';
  document.getElementById('inp-pass').value = '';
  document.getElementById('login-screen').style.display = 'flex';
  // Limpiar carrito al salir
  cart = [];
  updateCartCount();
  showTab(0);
}

// Inicializar
renderCategoryFilters();
renderCatalog(products);
updateCartCount();
</script>
